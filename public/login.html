<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <title>Вход | CockPerskiy</title>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <link rel="stylesheet" href="/assets/css/auth.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Вход в аккаунт</h1>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="example@mail.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" name="password" placeholder="Введите пароль" required autocomplete="current-password">
        </div>
        <div class="form-error" id="formError" style="display:none; color:red;"></div>
        <button type="submit" class="btn btn-primary btn-block">Войти</button>
      </form>
      <p style="text-align: center; margin-top: 20px;">
        Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
      </p>
    </div>
  </div>

  <script>
  // Встроенный api.js
  (function() {
    const API_BASE = window.location.origin + '/api';
    window.api = {
      async request(endpoint, options = {}) {
        const token = localStorage.getItem('token');
        const headers = {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
          ...(token && { Authorization: `Bearer ${token}` }),
          ...options.headers
        };
        const response = await fetch(`${API_BASE}${endpoint}`, {
          ...options,
          headers,
        });
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          const text = await response.text();
          throw new Error(`Сервер вернул не JSON: ${response.status} ${text}`);
        }
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || JSON.stringify(data));
        }
        return data;
      },
      get(endpoint) { return this.request(endpoint); },
      post(endpoint, body) { return this.request(endpoint, { method: 'POST', body: JSON.stringify(body) }); },
      put(endpoint, body) { return this.request(endpoint, { method: 'PUT', body: JSON.stringify(body) }); },
      delete(endpoint) { return this.request(endpoint, { method: 'DELETE' }); },
    };
  })();
</script>
  <script>
    // Теперь window.api точно существует
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('loginForm');
      const errorDiv = document.getElementById('formError');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        errorDiv.style.display = 'none';
        const email = form.email.value;
        const password = form.password.value;

        try {
          const result = await window.api.post('/login', { email, password });
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          window.location.href = '/profile.html';
        } catch (error) {
          errorDiv.textContent = error.message;
          errorDiv.style.display = 'block';
        }
      });
    });
  </script>
  <script src="/assets/js/header.js"></script>
</body>
</html>
