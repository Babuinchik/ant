<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация | CockPerskiy</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Регистрация</h1>
      <p>Создайте аккаунт для управления подписками</p>
      <form id="registerForm">
        <div class="form-group">
          <label>Имя</label>
          <input type="text" name="name" required placeholder="Иван Иванов">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="example@mail.com">
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" name="password" required minlength="8" placeholder="Минимум 8 символов">
        </div>
        <div class="form-group">
          <label>Подтверждение пароля</label>
          <input type="password" name="password_confirmation" required minlength="8" placeholder="Повторите пароль">
        </div>
        <div class="form-error" id="formError" style="display:none; color:red;"></div>
        <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
      </form>
      <p style="text-align: center; margin-top: 20px;">
        Уже есть аккаунт? <a href="/login.html">Войти</a>
      </p>
    </div>
  </div>

  
  <script>
  // НЕ type="module", просто обычный скрипт
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorDiv = document.getElementById('formError');
    errorDiv.style.display = 'none';
    const email = this.email.value;
    const password = this.password.value;
    try {
      const result = await window.api.post('/login', { email, password });
      localStorage.setItem('token', result.token);
      localStorage.setItem('user', JSON.stringify(result.user));
      window.location.href = '/profile.html';
    } catch (error) {
      errorDiv.textContent = error.message;
      errorDiv.style.display = 'block';
    }
  });
</script>
<script src="/assets/js/header.js"></script>
</body>
</html>
