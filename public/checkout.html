<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа | CockPerskiy</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/checkout.css">
</head>
<body>
  <div id="header-container"></div>

  <section class="checkout-section">
    <div class="container">
      <div class="checkout-grid">
        <div class="checkout-main">
          <h2>Оформление заказа</h2>
          <div class="selected-tariff" id="selectedTariff">Загрузка...</div>
          <form id="checkoutForm" class="checkout-form">
            <h3>Личные данные</h3>
            <div class="form-row">
              <div class="form-group"><label>Имя</label><input type="text" name="first_name" placeholder="Иван" required></div>
              <div class="form-group"><label>Фамилия</label><input type="text" name="last_name" placeholder="Иванов" required></div>
            </div>
            <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="example@mail.com" required></div>

            <h3>Способ оплаты</h3>
            <div class="payment-methods">
              <label class="payment-method">
                <input type="radio" name="payment_method" value="card" checked>
                <span class="payment-method-content"><span class="payment-icon">💳</span> Банковская карта</span>
              </label>
              <label class="payment-method">
                <input type="radio" name="payment_method" value="sbp">
                <span class="payment-method-content"><span class="payment-icon">📱</span> СБП</span>
              </label>
            </div>

            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" required> Я согласен с условиями использования
              </label>
            </div>

            <div id="formError" style="display:none; color:red; margin-bottom:15px;"></div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">Оплатить</button>
          </form>
        </div>

        <aside class="checkout-sidebar">
          <div class="order-summary">
            <h3>Ваш заказ</h3>
            <div class="summary-item"><span id="tariffName">—</span><span id="tariffPrice">0 ₽</span></div>
            <div class="summary-divider"></div>
            <div class="summary-item total"><span>Итого</span><span id="totalPrice">0 ₽</span></div>
            <div class="summary-info">
              <p>🔒 Безопасное соединение</p>
              <p>⚡ Мгновенная активация</p>
              <p>🔄 30 дней на возврат</p>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <!-- Встроенный window.api -->
  <script>
    (function() {
      const API_BASE = window.location.origin + '/api';
      window.api = {
        async request(endpoint, options = {}) {
          const token = localStorage.getItem('token');
          const headers = {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            ...(token && { Authorization: `Bearer ${token}` }),
            ...options.headers
          };
          const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
          const contentType = response.headers.get('content-type');
          if (!contentType || !contentType.includes('application/json')) {
            const text = await response.text();
            throw new Error(`Сервер вернул не JSON: ${response.status} ${text}`);
          }
          const data = await response.json();
          if (!response.ok) throw new Error(data.message || JSON.stringify(data));
          return data;
        },
        get(endpoint) { return this.request(endpoint); },
        post(endpoint, body) { return this.request(endpoint, { method: 'POST', body: JSON.stringify(body) }); }
      };
    })();
  </script>

  <script>
    // Загрузка компонентов
    fetch('/components/header.html').then(r => r.text()).then(html => {
      document.getElementById('header-container').innerHTML = html;
      updateNav();
    });
    fetch('/components/footer.html').then(r => r.text()).then(html => {
      document.getElementById('footer-container').innerHTML = html;
    });

    function updateNav() {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      const guestLinks = document.getElementById('guestLinks');
      const userLinks = document.getElementById('userLinks');
      const adminLink = document.getElementById('adminLink');
      if (token) {
        if (guestLinks) guestLinks.style.display = 'none';
        if (userLinks) userLinks.style.display = 'flex';
        if (adminLink && user.role === 'admin') adminLink.style.display = 'block';
      } else {
        if (guestLinks) guestLinks.style.display = 'flex';
        if (userLinks) userLinks.style.display = 'none';
        if (adminLink) adminLink.style.display = 'none';
      }
    }

    // Получить ID тарифа из URL
    const params = new URLSearchParams(window.location.search);
    const tariffId = params.get('tariff');

    async function loadTariffInfo() {
      if (!tariffId) {
        document.getElementById('selectedTariff').innerHTML = '<p style="color:red;">Тариф не выбран</p>';
        return;
      }
      try {
        const tariff = await window.api.get(`/tariffs/${tariffId}`);
        document.getElementById('selectedTariff').innerHTML = `<h3>${tariff.name}</h3><p>${tariff.description}</p>`;
        document.getElementById('tariffName').textContent = tariff.name;
        document.getElementById('tariffPrice').textContent = tariff.price + ' ₽';
        document.getElementById('totalPrice').textContent = tariff.price + ' ₽';
      } catch (error) {
        document.getElementById('selectedTariff').innerHTML = `<p style="color:red;">Ошибка загрузки тарифа: ${error.message}</p>`;
      }
    }

    // Обработка формы
    document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('formError');
      errorDiv.style.display = 'none';
      const btn = this.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Обработка...';
      try {
        const token = localStorage.getItem('token');
        if (!token) {
          alert('Вы не авторизованы. Пожалуйста, войдите.');
          window.location.href = '/login.html';
          return;
        }
        const order = await window.api.post('/orders', { tariff_id: tariffId });
        btn.textContent = 'Оплачено!';
        alert(`Подписка оформлена! Лицензионный ключ: ${order.subscription?.license_key || 'не получен'}`);
        window.location.href = '/subscriptions.html';
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Оплатить';
      }
    });

    document.addEventListener('DOMContentLoaded', loadTariffInfo);
  </script>
</body>
</html>
