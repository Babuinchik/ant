<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель | CockPerskiy</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Боковое меню -->
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <h2>🛡️ Админ-панель</h2>
      </div>
      <nav>
        <a href="/admin/dashboard.html" class="active">📊 Дашборд</a>
        <a href="/admin/users.html">👥 Пользователи</a>
        <a href="/admin/tariffs.html">💰 Тарифы</a>
        <a href="/admin/orders.html">📦 Заказы</a>
        <a href="/admin/licenses.html">🔑 Лицензии</a>
        <a href="/admin/statistics.html">📈 Статистика</a>
      </nav>
    </aside>

    <!-- Основной контент -->
    <main class="admin-content">
      <h1>Дашборд</h1>
      
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Выручка</h3>
          <div class="stat-value" id="revenue">0 ₽</div>
          <p class="stat-change positive">+12% за месяц</p>
        </div>
        
        <div class="stat-card">
          <h3>Активные подписки</h3>
          <div class="stat-value" id="activeSubs">0</div>
          <p class="stat-change positive">+5% за месяц</p>
        </div>
        
        <div class="stat-card">
          <h3>Пользователи</h3>
          <div class="stat-value" id="totalUsers">0</div>
          <p class="stat-change positive">+8% за месяц</p>
        </div>
        
        <div class="stat-card">
          <h3>Конверсия</h3>
          <div class="stat-value" id="conversion">0%</div>
          <p class="stat-change negative">-2% за месяц</p>
        </div>
      </div>

      <!-- Таблица последних заказов -->
      <h2>Последние заказы</h2>
      <table id="recentOrders">
        <thead>
          <tr>
            <th>ID</th>
            <th>Пользователь</th>
            <th>Тариф</th>
            <th>Сумма</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="7" style="text-align: center;">Загрузка...</td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script type="module">
  import { api } from '/assets/js/api.js';
  async function loadStats() {
    const stats = await api.get('/admin/statistics');
    document.getElementById('revenue').textContent = stats.revenue + ' ₽';
    document.getElementById('activeSubs').textContent = stats.active_subscriptions;
    document.getElementById('totalUsers').textContent = stats.total_users;
    document.getElementById('conversion').textContent = stats.conversion_rate + '%';
  }
  loadStats();
</script>
  <script>
    async function loadAdminDashboard() {
      const token = localStorage.getItem('token');
      
      try {
        const response = await fetch('/api/admin/statistics', {
          headers: {'Authorization': `Bearer ${token}`}
        });
        const stats = await response.json();
        
        document.getElementById('revenue').textContent = stats.revenue.toLocaleString() + ' ₽';
        document.getElementById('activeSubs').textContent = stats.active_subscriptions;
        document.getElementById('totalUsers').textContent = stats.total_users;
        document.getElementById('conversion').textContent = stats.conversion_rate + '%';
      } catch (error) {
        console.error('Ошибка загрузки статистики:', error);
      }
    }

    loadAdminDashboard();
  </script>
</body>
</html>
