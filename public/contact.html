<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | CockPerskiy</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div id="header-container"></div>

    <section class="page-hero">
        <div class="container">
            <h1>Свяжитесь с нами</h1>
            <p>Мы всегда рады помочь</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <div class="contact-card">
                        <h3>📧 Email</h3>
                        <p>support@cockperskiy.com</p>
                        <p>sales@cockperskiy.com</p>
                    </div>
                    <div class="contact-card">
                        <h3>📞 Телефон</h3>
                        <p>8-800-123-45-67</p>
                        <p>+7 (495) 123-45-67</p>
                    </div>
                    <div class="contact-card">
                        <h3>📍 Адрес</h3>
                        <p>г. Москва, ул. Примерная, д. 123</p>
                    </div>
                    <div class="contact-card">
                        <h3>🕐 Часы работы</h3>
                        <p>Пн-Пт: 9:00 - 20:00</p>
                        <p>Сб-Вс: 10:00 - 18:00</p>
                    </div>
                </div>
                <div class="contact-form">
                    <h2>Отправить сообщение</h2>
                    <form id="contactForm">
                        <div class="form-group">
                            <label>Ваше имя</label>
                            <input type="text" name="name" placeholder="Иван Иванов" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" placeholder="example@mail.com" required>
                        </div>
                        <div class="form-group">
                            <label>Тема</label>
                            <select name="topic">
                                <option value="support">Техническая поддержка</option>
                                <option value="sales">Вопросы по оплате</option>
                                <option value="partnership">Сотрудничество</option>
                                <option value="other">Другое</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Сообщение</label>
                            <textarea name="message" rows="5" placeholder="Опишите ваш вопрос..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showNotification('Сообщение отправлено! Мы ответим в ближайшее время.', 'success');
            this.reset();
        });
    </script>
    <script src="/assets/js/header.js"></script>
</body>
</html>
