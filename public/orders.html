<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>История заказов | CockPerskiy</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>
  <!-- Контейнер для шапки -->
  <div id="header-container"></div>

  <div class="container">
    <div class="dashboard">
      <aside class="sidebar">
        <ul>
          <li><a href="/profile.html">Обзор</a></li>
          <li><a href="/subscriptions.html">Мои подписки</a></li>
          <li><a href="/orders.html" class="active">История заказов</a></li>
        </ul>
      </aside>
      <main class="dashboard-content">
        <h1>История заказов</h1>
        <div id="ordersList">Загрузка...</div>
      </main>
    </div>
  </div>

  <!-- ВСТРОЕННЫЙ api.js (чтобы точно работал) -->
  <script>
    (function() {
      const API_BASE = window.location.origin + '/api';

      window.api = {
        async request(endpoint, options = {}) {
          const token = localStorage.getItem('token');
          const headers = {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            ...(token && { Authorization: `Bearer ${token}` }),
            ...options.headers
          };

          const response = await fetch(`${API_BASE}${endpoint}`, {
            ...options,
            headers,
          });

          const contentType = response.headers.get('content-type');
          if (!contentType || !contentType.includes('application/json')) {
            const text = await response.text();
            throw new Error(`Сервер вернул не JSON: ${response.status} ${text}`);
          }

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || JSON.stringify(data));
          }
          return data;
        },
        get(endpoint) { return this.request(endpoint); },
        post(endpoint, body) { return this.request(endpoint, { method: 'POST', body: JSON.stringify(body) }); },
        put(endpoint, body) { return this.request(endpoint, { method: 'PUT', body: JSON.stringify(body) }); },
        delete(endpoint) { return this.request(endpoint, { method: 'DELETE' }); },
      };
    })();
  </script>

  <script>
    // Загрузка шапки и навигации
    (function loadHeader() {
      fetch('/components/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          updateNav();
        })
        .catch(() => {});
    })();

    function updateNav() {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      const guestLinks = document.getElementById('guestLinks');
      const userLinks = document.getElementById('userLinks');
      const adminLink = document.getElementById('adminLink');
      if (token) {
        if (guestLinks) guestLinks.style.display = 'none';
        if (userLinks) userLinks.style.display = 'flex';
        if (adminLink && user.role === 'admin') adminLink.style.display = 'block';
      } else {
        if (guestLinks) guestLinks.style.display = 'flex';
        if (userLinks) userLinks.style.display = 'none';
        if (adminLink) adminLink.style.display = 'none';
      }
    }

    // Загрузка списка заказов
    async function loadOrders() {
      const container = document.getElementById('ordersList');
      try {
        if (!window.api || typeof window.api.get !== 'function') {
          throw new Error('API не загружен');
        }
        const orders = await window.api.get('/orders');
        if (!orders || orders.length === 0) {
          container.innerHTML = '<p>У вас пока нет заказов.</p>';
          return;
        }
        const rows = orders.map(order => `
          <tr>
            <td>#${order.id}</td>
            <td>${order.tariff?.name || '—'}</td>
            <td>${order.amount} ₽</td>
            <td><span class="badge badge-${order.status === 'paid' ? 'success' : order.status === 'cancelled' ? 'danger' : 'warning'}">${order.status}</span></td>
            <td>${new Date(order.created_at).toLocaleDateString()}</td>
          </tr>
        `).join('');
        container.innerHTML = `
          <table>
            <thead><tr><th>ID</th><th>Тариф</th><th>Сумма</th><th>Статус</th><th>Дата</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (error) {
        container.innerHTML = `<p style="color:red;">Ошибка: ${error.message}</p>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadOrders);
  </script>
</body>
</html>
